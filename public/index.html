<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAKE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <!-- Vercel Speed Insights -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --green:    #39ff14;
      --green-dim:#1a7a09;
      --green-glow: rgba(57, 255, 20, 0.35);
      --bg:       #050a05;
      --panel:    #080f08;
      --border:   #1a3a1a;
      --food:     #ff4444;
      --food-glow: rgba(255, 68, 68, 0.5);
      --text:     #39ff14;
      --text-dim: #2a9a10;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* scanline overlay */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      z-index: 999;
    }

    /* vignette */
    body::after {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.65) 100%);
      z-index: 998;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 36px;
      letter-spacing: 18px;
      text-shadow:
        0 0 10px var(--green),
        0 0 30px var(--green),
        0 0 60px var(--green-dim);
      animation: flicker 6s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.7; }
      99% { opacity: 1; }
    }

    /* ── SCORE BAR ── */
    .scorebar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 8px 4px;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .scorebar span { color: var(--text); font-size: 10px; }

    /* ── CANVAS FRAME ── */
    .frame {
      position: relative;
      border: 2px solid var(--border);
      box-shadow:
        0 0 0 1px #0a200a,
        0 0 20px var(--green-glow),
        inset 0 0 30px rgba(0,0,0,0.8);
      background: var(--panel);
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    /* ── OVERLAY (start / game over) ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 10, 5, 0.88);
      gap: 20px;
      transition: opacity 0.3s;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-size: 18px;
      text-shadow: 0 0 12px var(--green), 0 0 30px var(--green-dim);
      text-align: center;
      line-height: 2;
    }

    .overlay-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.9;
    }

    .overlay-score {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      line-height: 2;
    }

    .btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
      padding: 12px 24px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.15s;
      text-shadow: 0 0 8px var(--green);
      box-shadow: 0 0 10px var(--green-glow);
    }

    .btn:hover {
      background: var(--green);
      color: var(--bg);
      text-shadow: none;
      box-shadow: 0 0 20px var(--green-glow);
    }

    /* ── FOOTER CONTROLS HINT ── */
    .controls {
      margin-top: 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--green-dim);
      display: flex;
      gap: 20px;
      letter-spacing: 1px;
    }

    .controls kbd {
      display: inline-block;
      border: 1px solid var(--green-dim);
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
    }

    /* ── LEVEL BADGE ── */
    .level-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 7px;
      color: var(--green-dim);
    }

    /* COMBO COUNTER */
    .combo-counter {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
      color: #ffdd00;
      text-shadow: 0 0 10px #ffdd00;
      opacity: 0;
      pointer-events: none;
      animation: comboPop 0.5s ease-out;
    }

    @keyframes comboPop {
      0% { opacity: 1; transform: scale(0.5) translateY(0); }
      100% { opacity: 0; transform: scale(1) translateY(-40px); }
    }

    /* SETTINGS MENU */
    .settings-menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(5, 10, 5, 0.95);
      border: 2px solid #39ff14;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      z-index: 1000;
      max-width: 90vw;
      width: 320px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.3);
      display: none;
    }

    .settings-menu.active { display: block; }
    .settings-menu h2 { margin-bottom: 15px; color: #39ff14; font-size: 14px; }
    .settings-group { margin: 12px 0; }
    .settings-group label { display: block; margin-bottom: 8px; font-size: 11px; color: #39ff14; letter-spacing: 1px; }
    
    /* DIFFICULTY BUTTONS */
    .difficulty-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .difficulty-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      background: transparent;
      color: #39ff14;
      border: 1px solid #39ff14;
      padding: 6px 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      flex: 1;
      max-width: 80px;
    }

    .difficulty-btn:hover { box-shadow: 0 0 8px rgba(57, 255, 20, 0.5); }
    .difficulty-btn.active { background: #39ff14; color: #050a05; box-shadow: 0 0 12px rgba(57, 255, 20, 0.8); }

    /* SKIN OPTIONS GRID - SIMPLIFIED */
    .skin-options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 8px;
      margin: 10px 0;
    }

    .skin-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      background: rgba(57, 255, 20, 0.05);
      border: 1px solid rgba(57, 255, 20, 0.3);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .skin-option:hover {
      background: rgba(57, 255, 20, 0.15);
      border-color: rgba(57, 255, 20, 0.6);
    }

    .skin-option.selected {
      background: rgba(255, 221, 0, 0.2);
      border-color: #ffdd00;
    }

    .skin-option-emoji {
      font-size: 18px;
    }

    .skin-option-name {
      font-size: 8px;
      color: #39ff14;
      font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* TOGGLE BUTTONS */
    .toggle-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      background: transparent;
      color: #39ff14;
      border: 1px solid #39ff14;
      padding: 6px 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      min-width: 70px;
    }
    .toggle-btn:hover { box-shadow: 0 0 8px rgba(57, 255, 20, 0.5); }
    .toggle-btn.active { background: #39ff14; color: #050a05; }

    /* SETTINGS CLOSE BUTTON */
    .settings-close-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      background: transparent;
      color: #39ff14;
      border: 1px solid #39ff14;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
      margin-top: 12px;
      width: 100%;
    }

    .settings-close-btn:hover {
      background: #39ff14;
      color: #050a05;
      text-shadow: none;
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.8);
    }

    /* RESPONSIVE MOBILE */
    @media (max-width: 480px) {
      .settings-menu {
        width: 85vw;
        padding: 15px;
      }

      .settings-menu h2 {
        font-size: 12px;
        margin-bottom: 10px;
      }

      .difficulty-btn {
        font-size: 7px;
        padding: 5px 8px;
      }

      .toggle-btn {
        font-size: 8px;
        padding: 5px 10px;
        min-width: 60px;
      }

      .skin-options-grid {
        grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
        gap: 6px;
      }

      .skin-option-emoji {
        font-size: 16px;
      }

      .settings-close-btn {
        font-size: 8px;
        padding: 6px 12px;
      }
    }

    /* ANIMATED BACKGROUND */
    #stars-canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* STATS DISPLAY */
    .stats-panel {
      background: rgba(5, 10, 5, 0.92);
      border: 2px solid #39ff14;
      padding: 20px;
      border-radius: 8px;
      margin: 15px 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #39ff14;
      line-height: 2;
      text-shadow: 0 0 5px rgba(57, 255, 20, 0.3);
      min-width: 280px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(57, 255, 20, 0.2);
    }

    .stats-row:last-child {
      border-bottom: none;
    }

    .stats-label { color: #2a9a10; }
    .stats-value { color: #ffdd00; font-weight: bold; }

    /* PAUSE OVERLAY */
    #overlay-pause {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(5, 10, 5, 0.9);
      gap: 20px;
      transition: opacity 0.3s;
      z-index: 500;
    }

    #overlay-pause.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .difficulty-selector {
      display: flex;
      gap: 10px;
    }

    .difficulty-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      background: transparent;
      color: #39ff14;
      border: 1px solid #39ff14;
      padding: 10px 15px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
    }

    .difficulty-btn:hover {
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }

    .difficulty-btn.active {
      background: #39ff14;
      color: #050a05;
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.8);
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">SNAKE</div>
  </header>

  <div class="scorebar">
    SCORE <span id="score-display">0</span>
    &nbsp;&nbsp;&nbsp;
    HIGH SCORE <span id="hi-display">0</span>
    &nbsp;&nbsp;&nbsp;
    LEVEL <span id="level-display">1</span>
    &nbsp;&nbsp;&nbsp;
    COMBO <span id="combo-display">0</span>x
  </div>

  <div class="frame" id="game-frame">
    <canvas id="canvas"></canvas>

    <!-- Start Overlay -->
    <div class="overlay" id="overlay-start">
      <div class="overlay-title">SNAKE</div>
      <div class="overlay-sub">
        USE ARROW KEYS<br>
        OR W A S D<br>
        TO MOVE
      </div>
      <button class="btn" onclick="showSettings()">⚙ SETTINGS</button>
      <button class="btn" onclick="startGame()">PRESS START</button>
    </div>

    <!-- Settings Menu -->
    <div class="settings-menu" id="settings-menu">
      <h2>SETTINGS</h2>
      
      <div class="settings-group">
        <label>DIFFICULTY</label>
        <div class="difficulty-selector">
          <button class="difficulty-btn active" onclick="setDifficulty('easy')">EASY</button>
          <button class="difficulty-btn" onclick="setDifficulty('normal')">NORM</button>
          <button class="difficulty-btn" onclick="setDifficulty('hard')">HARD</button>
        </div>
      </div>

      <div class="settings-group">
        <label>SNAKE SKIN</label>
        <div class="skin-options-grid" id="skin-options-grid"></div>
      </div>

      <div class="settings-group">
        <label>SOUND</label>
        <button class="toggle-btn" id="sound-toggle" onclick="toggleSound()">ON</button>
      </div>

      <button class="settings-close-btn" onclick="hideSettings()">BACK</button>
    </div>

    <!-- Pause Overlay -->
    <div class="overlay hidden" id="overlay-pause">
      <div class="overlay-title">PAUSED</div>
      <div class="stats-panel">
        <div class="stats-row">
          <span class="stats-label">CURRENT SCORE:</span>
          <span class="stats-value" id="pause-score">0</span>
        </div>
        <div class="stats-row">
          <span class="stats-label">LEVEL:</span>
          <span class="stats-value" id="pause-level">1</span>
        </div>
        <div class="stats-row">
          <span class="stats-label">COMBO:</span>
          <span class="stats-value" id="pause-combo">0x</span>
        </div>
      </div>
      <button class="btn" onclick="pauseGame()">RESUME</button>
      <button class="btn" onclick="startGame()">NEW GAME</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="overlay-gameover">
      <div class="overlay-title">GAME<br>OVER</div>
      <div class="overlay-score" id="go-score"></div>
      <div class="stats-panel">
        <div class="stats-row">
          <span class="stats-label">GAMES PLAYED:</span>
          <span class="stats-value" id="stats-games">0</span>
        </div>
        <div class="stats-row">
          <span class="stats-label">AVERAGE SCORE:</span>
          <span class="stats-value" id="stats-avg">0</span>
        </div>
        <div class="stats-row">
          <span class="stats-label">BEST STREAK:</span>
          <span class="stats-value" id="stats-streak">0</span>
        </div>
      </div>
      <button class="btn" onclick="showSettings()">⚙ SETTINGS</button>
      <button class="btn" onclick="startGame()">TRY AGAIN</button>
    </div>

    <div class="level-badge" id="level-badge">LVL 1</div>
  </div>

  <div class="controls">
    <span><kbd>↑↓←→</kbd> or <kbd>WASD</kbd> move</span>
    <span><kbd>P</kbd> pause</span>
    <span><kbd>ESC</kbd> settings</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ENHANCED SNAKE GAME v2.0
//  Features: Skins, Sound, Particles, Combo, Screen Shake
// ═══════════════════════════════════════════════════════════

// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const COLS = 24;
const ROWS = 24;
const CELL = 20;
const BASE_SPEED = 150;
const SPEED_STEP = 10;
const LEVEL_EVERY = 5;

// ─────────────────────────────────────────────
//  SETTINGS STATE
// ─────────────────────────────────────────────
const SKINS = {
  classic: { head: '#39ff14', body: '#1fb80d', name: 'Classic Green', emoji: '🐢', desc: 'Retro 80s style' },
  neon:    { head: '#ff00ff', body: '#8b008b', name: 'Neon Magenta', emoji: '💜', desc: 'Electric vibes' },
  electric:{ head: '#00ffff', body: '#0088ff', name: 'Electric Blue', emoji: '⚡', desc: 'High voltage' },
  sunset:  { head: '#ffaa00', body: '#ff6600', name: 'Sunset Fire', emoji: '🔥', desc: 'Warm and smooth' },
};

// DIFFICULTY SETTINGS
const DIFFICULTY = {
  easy:   { speed: 200, label: 'EASY' },
  normal: { speed: 150, label: 'NORMAL' },
  hard:   { speed: 100, label: 'HARD' },
};

let settings = {
  skin: 'classic',
  soundEnabled: true,
  particlesEnabled: true,
  backgroundEnabled: true,
  difficulty: 'normal',
};

// STATISTICS TRACKING
let stats = {
  gamesPlayed: 0,
  totalScore: 0,
  bestScore: 0,
  bestStreak: 0,
  currentStreak: 0,
};

// Load settings and stats from localStorage
function loadSettings() {
  const saved = localStorage.getItem('snake_settings');
  if (saved) settings = { ...settings, ...JSON.parse(saved) };
  
  const savedStats = localStorage.getItem('snake_stats');
  if (savedStats) stats = { ...stats, ...JSON.parse(savedStats) };
}

function saveSettings() {
  localStorage.setItem('snake_settings', JSON.stringify(settings));
  updateSettingsUI();
}

function saveStats() {
  localStorage.setItem('snake_stats', JSON.stringify(stats));
}

function recordGame(finalScore) {
  stats.gamesPlayed++;
  stats.totalScore += finalScore;
  if (finalScore > stats.bestScore) {
    stats.bestScore = finalScore;
    stats.currentStreak = 1;
  } else {
    stats.currentStreak = 0;
  }
  if (stats.currentStreak > stats.bestStreak) {
    stats.bestStreak = stats.currentStreak;
  }
  saveStats();
}

function getAverageScore() {
  return stats.gamesPlayed === 0 ? 0 : Math.round(stats.totalScore / stats.gamesPlayed);
}

loadSettings();

// ─────────────────────────────────────────────
//  SOUND SYSTEM (Web Audio API)
// ─────────────────────────────────────────────
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'sine') {
  if (!settings.soundEnabled) return;
  const now = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);
  gain.connect(audioContext.destination);
  osc.frequency.value = freq;
  osc.type = type;
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
  osc.start(now);
  osc.stop(now + duration);
}

function playEatSound() {
  playSound(800, 0.1);
  playSound(1000, 0.1, 'sine');
}

function playLevelUpSound() {
  playSound(500, 0.15);
  setTimeout(() => playSound(800, 0.15), 100);
}

function playGameOverSound() {
  playSound(400, 0.3);
  setTimeout(() => playSound(300, 0.3), 150);
}

function playBonusSound() {
  playSound(1200, 0.1);
  playSound(1500, 0.1);
}

// ─────────────────────────────────────────────
//  PARTICLE SYSTEM
// ─────────────────────────────────────────────
let particles = [];

class Particle {
  constructor(x, y, vx, vy, color) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.color = color;
    this.life = 1;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.2; // gravity
    this.life -= 0.03;
  }

  draw(ctx) {
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.life;
    ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, color, count = 8) {
  if (!settings.particlesEnabled) return;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    const speed = 2 + Math.random() * 2;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed;
    particles.push(new Particle(x, y, vx, vy, color));
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}

// ─────────────────────────────────────────────
//  SCREEN SHAKE
// ─────────────────────────────────────────────
let shakeAmount = 0;

function shake(amount) {
  shakeAmount = amount;
}

// ─────────────────────────────────────────────
//  COMBO SYSTEM
// ─────────────────────────────────────────────
let combo = 0;
let lastFoodTime = 0;

function updateCombo() {
  const now = Date.now();
  if (now - lastFoodTime > 3000) {
    combo = 0;
  }
}

function addCombo() {
  combo++;
  lastFoodTime = Date.now();
  if (combo > 1) {
    showComboNotif(combo);
  }
}

function showComboNotif(count) {
  if (!settings.soundEnabled) return;
  const notif = document.createElement('div');
  notif.className = 'combo-counter';
  notif.textContent = `${count}x COMBO!`;
  notif.style.color = `hsl(${count * 30}, 100%, 50%)`;
  document.getElementById('game-frame').appendChild(notif);
  setTimeout(() => notif.remove(), 500);
}

// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let snake, dir, nextDir, food, bonus, score, hiScore, level, running, paused, loopTimer, bonusTimer;

function freshState() {
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake = [{x: cx, y: cy}, {x: cx-1, y: cy}, {x: cx-2, y: cy}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  food = spawnFood();
  bonus = null;
  score = 0;
  level = 1;
  running = false;
  paused = false;
  combo = 0;
  shakeAmount = 0;
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (onSnake(pos));
  return pos;
}

function maybeSpawnBonus() {
  if (!bonus && score > 0 && score % 10 === 0) {
    clearTimeout(bonusTimer);
    do {
      bonus = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (onSnake(bonus) || (bonus.x === food.x && bonus.y === food.y));
    bonusTimer = setTimeout(() => { bonus = null; }, 5000);
  }
}

function onSnake(pos) {
  return snake.some(s => s.x === pos.x && s.y === pos.y);
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
function startGame() {
  clearTimeout(loopTimer);
  clearTimeout(bonusTimer);
  freshState();

  hiScore = parseInt(localStorage.getItem('snake_hi') || '0');
  updateHUD();

  document.getElementById('overlay-start').classList.add('hidden');
  document.getElementById('overlay-gameover').classList.add('hidden');
  document.getElementById('settings-menu').classList.remove('active');

  running = true;
  loop();
}

function loop() {
  if (!running) return;
  if (!paused) {
    tick();
    updateCombo();
  }
  const baseSpeed = DIFFICULTY[settings.difficulty].speed;
  const speed = Math.max(60, baseSpeed - (level - 1) * SPEED_STEP);
  loopTimer = setTimeout(loop, speed);
}

function tick() {
  dir = { ...nextDir };

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    addCombo();
    level = Math.floor(score / LEVEL_EVERY) + 1;
    const skinColor = SKINS[settings.skin].head;
    spawnParticles(head.x * CELL + CELL/2, head.y * CELL + CELL/2, skinColor, 12);
    playEatSound();
    food = spawnFood();
    maybeSpawnBonus();
    flashFood();
  } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
    score += 3;
    addCombo();
    level = Math.floor(score / LEVEL_EVERY) + 1;
    shake(5);
    playBonusSound();
    bonus = null;
    clearTimeout(bonusTimer);
  } else {
    snake.pop();
  }

  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('snake_hi', hiScore);
  }

  updateHUD();
  draw();
}

let foodFlash = 0;
function flashFood() { foodFlash = 6; }

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function draw() {
  // Apply screen shake
  ctx.save();
  if (shakeAmount > 0) {
    const shakeX = (Math.random() - 0.5) * shakeAmount;
    const shakeY = (Math.random() - 0.5) * shakeAmount;
    ctx.translate(shakeX, shakeY);
    shakeAmount *= 0.9;
  }

  // background
  ctx.fillStyle = '#050a05';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // grid
  ctx.strokeStyle = '#0a160a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  // Draw particles
  updateParticles();
  particles.forEach(p => p.draw(ctx));

  // bonus food
  if (bonus) {
    const bx = bonus.x * CELL + CELL / 2;
    const by = bonus.y * CELL + CELL / 2;
    ctx.shadowColor = 'rgba(255,220,0,0.7)';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffdd00';
    drawDiamond(bx, by, CELL * 0.38);
    ctx.shadowBlur = 0;
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
    ctx.strokeStyle = '#ffdd00';
    ctx.globalAlpha = pulse * 0.6;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx, by, CELL * 0.55, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // food
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  const fRadius = foodFlash > 0 ? CELL * 0.42 : CELL * 0.36;
  if (foodFlash > 0) foodFlash--;
  ctx.shadowColor = 'rgba(255,68,68,0.5)';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(fx, fy, fRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake
  const skinColor = SKINS[settings.skin];
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const isHead = i === 0;
    const t = i / snake.length;
    const sx = seg.x * CELL;
    const sy = seg.y * CELL;
    const pad = isHead ? 1 : 2;
    const r = isHead ? 4 : 3;

    if (isHead) {
      ctx.shadowColor = skinColor.head;
      ctx.shadowBlur = 12;
      ctx.shadowColor = skinColor.head + '80';
      ctx.fillStyle = skinColor.head;
    } else {
      ctx.shadowBlur = 0;
      const alpha = 1 - t * 0.5;
      ctx.fillStyle = skinColor.body + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    }

    roundRect(ctx, sx + pad, sy + pad, CELL - pad * 2, CELL - pad * 2, r);
    ctx.fill();

    if (isHead) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#050a05';
      const eyeSize = 3;
      const eyeOff = 4;
      let ex1, ey1, ex2, ey2;
      const cx_ = sx + CELL / 2;
      const cy_ = sy + CELL / 2;
      if (dir.x === 1) { ex1 = cx_+3; ey1 = cy_-eyeOff; ex2 = cx_+3; ey2 = cy_+eyeOff; }
      else if (dir.x === -1) { ex1 = cx_-3; ey1 = cy_-eyeOff; ex2 = cx_-3; ey2 = cy_+eyeOff; }
      else if (dir.y === -1) { ex1 = cx_-eyeOff; ey1 = cy_-3; ex2 = cx_+eyeOff; ey2 = cy_-3; }
      else { ex1 = cx_-eyeOff; ey1 = cy_+3; ex2 = cx_+eyeOff; ey2 = cy_+3; }
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawDiamond(cx, cy, r) {
  ctx.beginPath();
  ctx.moveTo(cx, cy - r);
  ctx.lineTo(cx + r, cy);
  ctx.lineTo(cx, cy + r);
  ctx.lineTo(cx - r, cy);
  ctx.closePath();
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('hi-display').textContent = hiScore;
  document.getElementById('level-display').textContent = level;
  document.getElementById('combo-display').textContent = combo;
  document.getElementById('level-badge').textContent = `LVL ${level}`;
}

// ─────────────────────────────────────────────
//  GAME OVER
// ─────────────────────────────────────────────
function gameOver() {
  running = false;
  clearTimeout(loopTimer);
  clearTimeout(bonusTimer);
  playGameOverSound();

  recordGame(score);

  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const el = document.getElementById('overlay-gameover');
  document.getElementById('go-score').innerHTML =
    `SCORE&nbsp;&nbsp;${score}<br>BEST&nbsp;&nbsp;&nbsp;${hiScore}`;
  
  // Update stats display
  document.getElementById('stats-games').textContent = stats.gamesPlayed;
  document.getElementById('stats-avg').textContent = getAverageScore();
  document.getElementById('stats-streak').textContent = stats.bestStreak;
  
  el.classList.remove('hidden');
}

// ─────────────────────────────────────────────
//  SKIN PREVIEW ANIMATION
// ─────────────────────────────────────────────
function updateSkinDisplay(skinName) {
  // Just update the grid - no canvas preview needed
  const skinsHtml = Object.entries(SKINS).map(([key, skin]) => `
    <div class="skin-option ${settings.skin === key ? 'selected' : ''}" 
         onclick="selectSkin('${key}')" 
         title="${skin.name}">
      <div class="skin-option-emoji">${skin.emoji}</div>
      <div class="skin-option-name">${skin.name.split(' ')[0]}</div>
    </div>
  `).join('');
  document.getElementById('skin-options-grid').innerHTML = skinsHtml;
}
function showSettings() {
  document.getElementById('settings-menu').classList.add('active');
  running = false;
  paused = true;
}

function hideSettings() {
  document.getElementById('settings-menu').classList.remove('active');
  if (running) paused = false;
}

function setDifficulty(difficulty) {
  settings.difficulty = difficulty;
  saveSettings();
  // Update button states
  document.querySelectorAll('.difficulty-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
}

function toggleSound() {
  settings.soundEnabled = !settings.soundEnabled;
  saveSettings();
  const btn = document.getElementById('sound-toggle');
  btn.textContent = settings.soundEnabled ? 'ON' : 'OFF';
  btn.classList.toggle('active');
}

function selectSkin(skinName) {
  settings.skin = skinName;
  saveSettings();
  updateSettingsUI();
}

function updateSettingsUI() {
  // Update difficulty buttons
  document.querySelectorAll('.difficulty-btn').forEach(btn => {
    const difficulty = btn.textContent.toLowerCase().replace('norm', 'normal');
    if (difficulty === settings.difficulty) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });

  // Update skin display
  updateSkinDisplay(settings.skin);

  // Update sound toggle
  document.getElementById('sound-toggle').textContent = settings.soundEnabled ? 'ON' : 'OFF';
  document.getElementById('sound-toggle').classList.toggle('active', settings.soundEnabled);
}

// ─────────────────────────────────────────────
//  PAUSE FUNCTION
// ─────────────────────────────────────────────
function pauseGame() {
  paused = !paused;
  const pauseOverlay = document.getElementById('overlay-pause');
  if (paused) {
    document.getElementById('pause-score').textContent = score;
    document.getElementById('pause-level').textContent = level;
    document.getElementById('pause-combo').textContent = combo + 'x';
    pauseOverlay.classList.remove('hidden');
  } else {
    pauseOverlay.classList.add('hidden');
  }
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
const KEY_MAP = {
  ArrowUp:    {x:  0, y: -1}, w: {x:  0, y: -1}, W: {x:  0, y: -1},
  ArrowDown:  {x:  0, y:  1}, s: {x:  0, y:  1}, S: {x:  0, y:  1},
  ArrowLeft:  {x: -1, y:  0}, a: {x: -1, y:  0}, A: {x: -1, y:  0},
  ArrowRight: {x:  1, y:  0}, d: {x:  1, y:  0}, D: {x:  1, y:  0},
};

// Mobile swipe detection
let touchStartX = 0;
let touchStartY = 0;

canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, false);

canvas.addEventListener('touchend', (e) => {
  if (!running) return;
  const touchEndX = e.changedTouches[0].clientX;
  const touchEndY = e.changedTouches[0].clientY;
  
  const dx = touchEndX - touchStartX;
  const dy = touchEndY - touchStartY;
  const threshold = 30;
  
  if (Math.abs(dx) > Math.abs(dy)) {
    // Horizontal swipe
    if (dx > threshold) {
      nextDir = {x: 1, y: 0}; // Right
    } else if (dx < -threshold) {
      nextDir = {x: -1, y: 0}; // Left
    }
  } else {
    // Vertical swipe
    if (dy > threshold) {
      nextDir = {x: 0, y: 1}; // Down
    } else if (dy < -threshold) {
      nextDir = {x: 0, y: -1}; // Up
    }
  }
}, false);

document.addEventListener('keydown', e => {
  // ESC for settings
  if (e.key === 'Escape') {
    if (document.getElementById('settings-menu').classList.contains('active')) {
      hideSettings();
    } else {
      showSettings();
    }
    return;
  }

  // P for pause
  if ((e.key === 'p' || e.key === 'P') && running) {
    pauseGame();
    return;
  }

  // Space/Enter for restart on game over
  if ((e.key === ' ' || e.key === 'Enter') && !running) {
    startGame();
    return;
  }

  // Movement keys
  const d = KEY_MAP[e.key];
  if (!d) return;
  if (d.x !== 0 && d.x === -dir.x) return;
  if (d.y !== 0 && d.y === -dir.y) return;
  nextDir = d;
  e.preventDefault();
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
freshState();
hiScore = parseInt(localStorage.getItem('snake_hi') || '0');
updateHUD();
updateSettingsUI();
draw();

// Keep food pulsing even on start screen
setInterval(() => { if (!running) draw(); }, 100);
</script>
